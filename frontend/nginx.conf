server {
    listen 80;
    
    # Lokasi file HTML
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Teruskan panggilan API ke kontainer backend
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
