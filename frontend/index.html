<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Video & MP3 Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { darkBg: '#0f172a', cardBg: '#1e293b' } } } }
    </script>
</head>
<body class="bg-darkBg text-gray-200 min-h-screen flex flex-col font-sans">
    <header class="border-b border-gray-700 bg-cardBg py-4 text-center">
        <h1 class="text-2xl font-extrabold tracking-tight text-white">YT<span class="text-red-500">Downloader</span></h1>
    </header>

    <main class="flex-grow max-w-3xl mx-auto w-full px-4 py-8">
        
        <!-- SLOT IKLAN HEADER -->
        <div class="w-full h-24 mb-6 flex items-center justify-center bg-gray-800/50 border border-dashed border-gray-600 rounded-lg text-gray-500 text-sm">
            [ Slot Iklan AdSense Header - 728x90 ]
        </div>

        <div class="bg-cardBg p-8 rounded-2xl shadow-xl border border-gray-700 text-center">
            <h2 class="text-3xl font-bold text-white mb-3">Unduh Video & Audio YouTube</h2>
            <p class="text-gray-400 mb-6">Tempel link YouTube (contoh: https://youtu.be/...) di bawah ini.</p>
            
            <div class="flex flex-col md:flex-row gap-3">
                <input type="url" id="urlInput" placeholder="https://youtube.com/watch?v=..." class="flex-1 px-4 py-3 rounded-lg bg-gray-900 border border-gray-600 focus:border-red-500 text-white outline-none transition">
                <button onclick="prosesVideo()" id="btnDownload" class="px-8 py-3 bg-red-600 hover:bg-red-500 font-bold rounded-lg transition text-white shadow-lg shadow-red-500/30">Cari Video</button>
            </div>

            <!-- SLOT IKLAN TENGAH -->
            <div class="w-full h-[250px] my-8 flex items-center justify-center bg-gray-800/50 border border-dashed border-gray-600 rounded-lg text-gray-500 text-sm">
                [ Slot Iklan AdSense Kotak - 300x250 ]
            </div>

            <!-- Area Hasil -->
            <div id="hasil" class="hidden p-5 bg-gray-800 rounded-xl border border-gray-700 flex flex-col md:flex-row gap-5 text-left items-start">
                <img id="thumb" class="w-full md:w-1/2 rounded shadow-lg object-cover aspect-video" alt="Thumbnail">
                <div class="flex-1 w-full">
                    <h3 id="judul" class="text-white font-bold line-clamp-3 mb-4 leading-snug">Judul YouTube</h3>
                    <p class="text-xs text-yellow-400 mb-2 font-mono" id="statusWait"></p>
                    
                    <div id="buttonContainer" class="flex flex-col gap-2 w-full">
                        <!-- Tombol masuk di sini -->
                    </div>
                </div>
            </div>
        </div>

        <!-- SLOT IKLAN FOOTER -->
        <div class="w-full h-24 mt-8 flex items-center justify-center bg-gray-800/50 border border-dashed border-gray-600 rounded-lg text-gray-500 text-sm">
            [ Slot Iklan AdSense Footer ]
        </div>
    </main>

    <script>
        async function prosesVideo() {
            const url = document.getElementById('urlInput').value;
            if(!url) return alert("Masukkan URL YouTube!");
            
            const btn = document.getElementById('btnDownload');
            btn.innerText = "Mencari...";
            btn.classList.add("opacity-50", "pointer-events-none");
            document.getElementById('hasil').classList.add("hidden");
            document.getElementById('statusWait').innerText = "";
            const btnContainer = document.getElementById('buttonContainer');
            btnContainer.innerHTML = ''; 

            try {
                const res = await fetch(`/api/extract?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                
                if(res.ok && data.success) {
                    document.getElementById('thumb').src = data.thumbnail;
                    document.getElementById('judul').innerText = data.title;
                    
                    data.downloads.forEach(dl => {
                        const isAudio = dl.type === 'audio';
                        const btnEl = document.createElement('button');
                        
                        const colorClass = isAudio ? "bg-green-600 hover:bg-green-500" : "bg-blue-600 hover:bg-blue-500";
                        btnEl.className = `block px-4 py-3 ${colorClass} text-white text-sm font-bold rounded shadow-md w-full text-center transition`;
                        
                        const icon = isAudio ? "🎵 " : "🎥 ";
                        btnEl.innerText = icon + dl.name;
                        
                        // Eksekusi Pemicu Download Langsung
                        btnEl.onclick = function() {
                             document.getElementById('statusWait').innerText = "Server sedang meracik file, tunggu pop-up download (jangan tutup layar)...";
                             btnEl.innerText = "Sedang Mengunduh ⏳";
                             btnEl.classList.add("opacity-50", "animate-pulse", "pointer-events-none");
                             
                             // Arahkan browser langsung ke API (FastAPI FileResponse akan memaksa pop-up download)
                             window.location.href = dl.link;
                             
                             // Kembalikan tombol ke normal setelah 7 detik
                             setTimeout(() => {
                                 btnEl.innerText = icon + dl.name;
                                 btnEl.classList.remove("opacity-50", "animate-pulse", "pointer-events-none");
                                 document.getElementById('statusWait').innerText = "";
                             }, 7000);
                        };
                        
                        btnContainer.appendChild(btnEl);
                    });

                    document.getElementById('hasil').classList.remove("hidden");
                } else {
                    alert(data.detail || "Gagal mengambil video.");
                }
            } catch(e) {
                alert("Terjadi kesalahan sistem.");
            }
            
            btn.innerText = "Cari Video";
            btn.classList.remove("opacity-50", "pointer-events-none");
        }
    </script>
</body>
</html>
